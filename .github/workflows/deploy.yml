name: CI/CD Pipeline - Build, Push & Deploy

# ===== WHEN does this pipeline run? =====
# It triggers whenever code is pushed to the 'main' branch
on:
  push:
    branches:
      - main

# ===== WHAT does it do? =====
jobs:
  # ========================================
  # JOB 1: Build and Push Docker Images
  # ========================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub using secrets
      # (We store username/password as GitHub Secrets — never hardcode!)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build and Push Backend Docker Image
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crud-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crud-backend:${{ github.sha }}

      # Step 4: Build and Push Frontend Docker Image
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/crud-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/crud-frontend:${{ github.sha }}

  # ========================================
  # JOB 2: Deploy to the Ubuntu VM
  # ========================================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push  # Only runs AFTER images are built and pushed
    steps:
      # Step 1: SSH into the VM and deploy
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}         # VM's public IP address
          username: ${{ secrets.VM_USERNAME }}  # e.g., 'ubuntu' for AWS
          key: ${{ secrets.VM_SSH_KEY }}        # Private SSH key
          script: |
            # Navigate to the project directory on the VM
            cd ~/crud-dd-task-mean-app

            # Pull latest code from GitHub (to get updated docker-compose.yml, nginx config, etc.)
            git pull origin main

            # Export Docker Hub username for docker-compose.yml
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            # Pull the latest Docker images from Docker Hub
            docker compose pull

            # Restart containers with the new images
            # --force-recreate ensures containers are recreated even if config hasn't changed
            # -d runs them in detached mode (background)
            docker compose up -d --force-recreate

            # Clean up old unused images to save disk space
            docker image prune -f
