version: '3.8'

services:
  # ===== 1. MongoDB Database =====
  # Using the official MongoDB Docker image (no need to install MongoDB on VM)
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      # This stores database data on the host machine
      # So data persists even if the container is destroyed
      - mongodb_data:/data/db
    networks:
      - app-network

  # ===== 2. Backend (Node.js + Express) =====
  backend:
    image: ${DOCKERHUB_USERNAME:-yaswanth3333}/crud-backend:latest
    container_name: backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # 'mongodb' here refers to the service name above — Docker's internal DNS
      - MONGODB_URI=mongodb://mongodb:27017/dd_db
      # Allow requests from Nginx (port 80)
      - CORS_ORIGIN=*
      - PORT=8080
    depends_on:
      - mongodb
    networks:
      - app-network

  # ===== 3. Frontend (Angular served by Nginx) =====
  frontend:
    image: ${DOCKERHUB_USERNAME:-yaswanth3333}/crud-frontend:latest
    container_name: frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - app-network

  # ===== 4. Nginx Reverse Proxy =====
  # Sits in front of everything — accessible on port 80
  # Routes / to frontend, /api to backend
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      # Mount our custom Nginx config
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

# Named volume for MongoDB data persistence
volumes:
  mongodb_data:

# Custom network so all containers can talk to each other by name
networks:
  app-network:
    driver: bridge
